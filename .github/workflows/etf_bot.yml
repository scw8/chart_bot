name: ETF 알림 봇

on:
  schedule:
    - cron: '0 0 * * 1-5'       # 09:00 KST 한국장 시작
    - cron: '0 3 * * 1-5'       # 12:00 KST 한국장 점심
    - cron: '30 6 * * 1-5'      # 15:30 KST 한국장 마감
    - cron: '30 13 * * 1-5'     # 22:30 KST 써머타임 미국장 시작
    - cron: '30 14 * * 1-5'     # 23:30 KST 표준시 미국장 시작
    - cron: '0,30 0-21 * * 1-5' # 30분마다 변동 체크
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 라이브러리 설치
        run: pip install yfinance finance-datareader python-telegram-bot requests python-dotenv schedule pytz

      - name: 환경변수 설정
        run: |
          echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" >> .env
          echo "CHAT_ID=${{ secrets.CHAT_ID }}" >> .env

      - name: 실행 모드 결정 및 봇 실행
        run: |
          SCHEDULE="${{ github.event.schedule }}"

          if [ "$SCHEDULE" = "0 0 * * 1-5" ]; then
            python main.py korea_open
          elif [ "$SCHEDULE" = "0 3 * * 1-5" ]; then
            python main.py korea_noon
          elif [ "$SCHEDULE" = "30 6 * * 1-5" ]; then
            python main.py korea_close
          elif [ "$SCHEDULE" = "30 13 * * 1-5" ] || [ "$SCHEDULE" = "30 14 * * 1-5" ]; then
            python main.py us_open
          else
            python main.py alert
          fi